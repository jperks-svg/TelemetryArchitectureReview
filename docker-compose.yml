services:
  app:
    build: .
    ports:
      - "3030:3030"
    environment:
      - GLEAN_BASE_URL=${GLEAN_BASE_URL:-https://cribl-be.glean.com}
      - APP_URL=${APP_URL:-http://localhost:3030}
      - PORT=3030
      - NODE_ENV=production
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
